name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docker compose
        run: |
          # GitHub Actions ubuntu-latest has docker daemon but compose plugin
          # may be absent. Install standalone compose binary.
          if ! docker compose version >/dev/null 2>&1; then
            DOCKER_CONFIG="${DOCKER_CONFIG:-$HOME/.docker}"
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            curl -sSL "https://github.com/docker/compose/releases/download/v2.33.1/docker-compose-$(uname -s)-$(uname -m)" -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
            chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          fi
          docker compose version
      - name: Source manifest and run e2e
        run: |
          set -euo pipefail
          echo "=== Sourcing manifest ==="
          source verify/manifest.env
          echo "=== Installing test deps ==="
          eval "$TEST_DEPS"
          echo "=== Bringing stack UP ==="
          eval "$UP"
          echo "=== Waiting for READY ==="
          eval "$READY"
          echo "=== Running ACCEPTANCE tests ==="
          eval "$ACCEPTANCE"
          echo "=== Tearing DOWN ==="
          eval "$DOWN"
          echo "=== DONE ==="
