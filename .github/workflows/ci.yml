name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leetcode
          POSTGRES_PASSWORD: leetcode
          POSTGRES_DB: leetcode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leetcode"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install psycopg2-binary
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://leetcode:leetcode@localhost:5432/leetcode
        run: alembic upgrade head
      - name: Start server and run acceptance tests
        env:
          DATABASE_URL: postgresql+asyncpg://leetcode:leetcode@localhost:5432/leetcode
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: change-me-in-production
        run: |
          set -euo pipefail
          uvicorn leetcode.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz >/dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          API_BASE_URL=http://localhost:8000 pytest verify/acceptance/ -v
          kill $SERVER_PID 2>/dev/null || true
