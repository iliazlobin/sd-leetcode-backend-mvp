services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leetcode
      POSTGRES_PASSWORD: leetcode
      POSTGRES_DB: leetcode
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetcode"]
      interval: 2s
      timeout: 5s
      retries: 5
    # No host port exposed — app talks over compose network.

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
    # No host port exposed — app talks over compose network.

  app:
    build: .
    ports:
      - "${APP_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://leetcode:leetcode@db:5432/leetcode
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 5
